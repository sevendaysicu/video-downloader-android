name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 升级至 Java 17 环境 (解决最后阶段 gradlew 封包限制)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: 3. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 4. 安装 Linux 系统底层编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libffi-dev libssl-dev libncurses5-dev libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev tk-dev libgmp-dev libmpfr-dev libmpc-dev libasound2-dev patchelf unzip
          sudo apt-get install -y lib32stdc++6 lib32z1

      - name: 5. 部署现代 SDK 工具链与智能替身
        run: |
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          
          # 下载完全兼容的现代版命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # 建立脚本替身，完美欺骗 Buildozer
          mkdir -p $SDK_DIR/tools/bin
          cat << 'EOF' > $SDK_DIR/tools/bin/sdkmanager
          #!/bin/bash
          /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "$@"
          EOF
          chmod +x $SDK_DIR/tools/bin/sdkmanager
          
          # 签协议
          mkdir -p $SDK_DIR/licenses
          echo -e "\n244d2d25b6ad2030201111976193d7b38577c9a7" > $SDK_DIR/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_DIR/licenses/android-sdk-preview-license
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: 6. 安装 Buildozer 核心打包工具
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade virtualenv buildozer sh Cython

      - name: 7. 预装组件并进行防污染清理 (修复 lld-bin 版本解析崩溃)
        run: |
          SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          
          # 直接使用现代工具下载所需组件，抛弃之前惹祸的 cp 复制命令
          yes | $SDK_DIR/tools/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
          
          # 【核心修复】强行清理掉 build-tools 目录下所有名字不是数字版本号的文件夹（如 lld-bin），确保解析器不崩溃
          if [ -d "$SDK_DIR/build-tools" ]; then
            find $SDK_DIR/build-tools/ -mindepth 1 -maxdepth 1 -type d ! -name "*.*.*" -exec rm -rf {} + || true
          fi

      - name: 8. 启动全速打包并配置智能报错捕获机制
        run: |
          chmod -R 777 .
          buildozer android debug > buildozer_output.log 2>&1 || {
            echo "------------------- ❌ 编译不幸崩溃！为您拦截并抓取核心底层报错 -------------------"
            tail -n 150 buildozer_output.log
            exit 1
          }

      - name: 9. 完美上传打包好的 APK 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-APK
          path: bin/*.apk
