name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # 锁定高兼容性系统
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装并配置 Java 环境 (Android 编译必备)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # 锁定稳定的 JDK 17

      - name: 3. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. 安装 Linux 系统底层打包依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev osspd libssl-dev textit build-essential ccache git zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev tk-dev libgmp-dev libmpfr-dev libmpc-dev libasound2-dev

      - name: 5. 升级 pip 并配置核心打包库
        run: |
          pip install --upgrade pip
          pip install --upgrade Cython==0.29.33 virtualenv buildozer

      - name: 6. 启动官方 Buildozer 引擎一键编译
        run: |
          # 自动同意所有安卓 SDK 协议，防止编译时卡住暂停
          yes | buildozer android debug

      - name: 7. 完美上传打包好的 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-APK
          path: bin/*.apk
