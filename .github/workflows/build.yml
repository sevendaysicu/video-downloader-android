name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04  # 保持稳定的 Ubuntu 环境
    steps:
      - uses: actions/checkout@v4  # 保持 v4，防止过时警告

      - name: Get Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1  # 【已修正】完美回归官方支持的 v1 版本
        with:
          buildozer_version: stable
          command: buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4  # 保持 v4，彻底解决 v3 被 GitHub 禁用的问题
        with:
          name: VideoDownloader-APK
          path: bin/*.apk
