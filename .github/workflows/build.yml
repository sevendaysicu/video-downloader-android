name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装并配置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: 3. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 4. 安装 Linux 系统底层打包依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libffi-dev libssl-dev libncurses5-dev libgdbm-dev libnss3-dev libsqlite3-dev libreadline-dev tk-dev libgmp-dev libmpfr-dev libmpc-dev libasound2-dev patchelf unzip
          sudo apt-get install -y lib32stdc++6 lib32z1

      - name: 5. 预装 Android SDK 核心组件并进行全局环境变量穿透
        run: |
          # 1. 下载并安装最新版 cmdline-tools
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools
          cd /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # 2. 全自动同意所有证书协议
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n244d2d25b6ad2030201111976193d7b38577c9a7" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          
          # 3. 强行呼叫官方 sdkmanager 下载包含了 aidl 的最稳组件 build-tools 和 platform-tools
          export SDKMANAGER="/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          $SDKMANAGER --sdk_root=/home/runner/.buildozer/android/platform/android-sdk "build-tools;33.0.0" "platforms;android-33" "platform-tools"
          
          # 4. 【核心路径欺骗】建立老旧古老的 tools/bin 路径供老版本 Buildozer 识别
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          ln -s /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          # 5. 【终极绝杀】将所有包含 aidl 的路径强行穿透写入 GitHub 系统的全局环境变量中！
          echo "/home/runner/.buildozer/android/platform/android-sdk/build-tools/33.0.0" >> $GITHUB_PATH
          echo "/home/runner/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "/home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: 6. 安装 2026 标准 Buildozer 环境
        run: |
          python -m pip install --upgrade pip
          # 顺便在全局环境中补充安装一下 cython，确保双重保险
          pip install --upgrade virtualenv buildozer sh Cython

      - name: 7. 启动官方 Buildozer 引擎一键极速编译
        run: |
          # 此时环境变量已完全穿透，系统在任何角落都能用 'aidl' 命令
          chmod -R 777 .
          buildozer -v android debug

      - name: 8. 完美上传打包好的 APK 产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-APK
          path: bin/*.apk
